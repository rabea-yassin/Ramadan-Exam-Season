<!DOCTYPE html>
<html>
<head>
  <title>Server Connection Test</title>
  <style>
    body { font-family: monospace; padding: 40px; background: #f5f2eb; }
    .status { padding: 20px; margin: 10px 0; border-radius: 8px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .loading { background: #fff3cd; color: #856404; }
  </style>
</head>
<body>
  <h1>Command Center - Server Test</h1>
  <div id="status" class="status loading">Testing connection...</div>
  <pre id="data"></pre>

  <script>
    async function test() {
      const statusEl = document.getElementById('status');
      const dataEl = document.getElementById('data');
      
      try {
        const response = await fetch('http://localhost:3000/api/data');
        if (!response.ok) throw new Error('Server returned ' + response.status);
        
        const data = await response.json();
        
        statusEl.className = 'status success';
        statusEl.textContent = '✓ Connected to server successfully!';
        dataEl.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        statusEl.className = 'status error';
        statusEl.innerHTML = `
          ✗ Failed to connect to server<br><br>
          Error: ${error.message}<br><br>
          Make sure the server is running:<br>
          <code>npm start</code>
        `;
      }
    }
    
    test();
  </script>
</body>
</html>
